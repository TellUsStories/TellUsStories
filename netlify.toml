# netlify.toml — Tale Us Stories
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from   = "/api/submit"
  to     = "/.netlify/functions/submit"
  status = 200

[[redirects]]
  from   = "/api/submit-background"
  to     = "/.netlify/functions/submit-background"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
