# netlify.toml — Tale Us Stories

[build]
  publish = "."           # raíz del proyecto (donde está index.html)
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"   # más rápido y ligero que webpack

# Redirigir /api/submit → función serverless
[[redirects]]
  from   = "/api/submit"
  to     = "/.netlify/functions/submit"
  status = 200

# Headers de seguridad básicos
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
